name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check dags plugins include src tests
      - name: yamllint
        run: yamllint .
      - name: Validate JSON configs
        run: |
          python -c "import json, glob; [json.load(open(f)) for f in glob.glob('src/debezium/*.json')]; print('Debezium JSON OK')"
      - name: Compile Python sources
        run: |
          python -m compileall dags plugins include src -q

  tests:
    name: Airflow DAG + unit tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      AIRFLOW_VERSION: "2.9.3"
      PYTHON_VERSION: "3.11"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__UNIT_TEST_MODE: "True"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "sqlite:////tmp/airflow.db"
      AIRFLOW_HOME: "/tmp/airflow_home"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install Airflow with constraints
        run: |
          python -m pip install --upgrade pip
          CONSTRAINT_URL="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"
          pip install "apache-airflow==${AIRFLOW_VERSION}" --constraint "${CONSTRAINT_URL}"
          pip install -r requirements-dev.txt
      - name: Initialise Airflow DB
        run: |
          mkdir -p "$AIRFLOW_HOME"
          airflow db migrate
      - name: Run pytest
        run: pytest tests/ -v
