[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "target", "build", "dist", ".venv", "src/scala",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "N", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["B", "N"]
"airflow/dags/**" = ["E402"]
"src/pyspark/**" = ["N812", "N802"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests/unit", "tests/dags"]
addopts = "-ra -q --strict-markers"
markers = [
    "integration: requires live services (compose up)",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]
